services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: boardgame_social
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d boardgame_social']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    image: node:20-alpine
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/boardgame_social?schema=public
      WEB_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/apps/api/node_modules
      - root_node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api prisma:generate &&
      pnpm --filter api exec prisma migrate deploy &&
      pnpm --filter api start:dev"
    networks:
      - app-network

  web:
    image: node:20-alpine
    working_dir: /workspace
    depends_on:
      - api
    env_file:
      - ./apps/web/.env.example
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
      - root_node_modules:/workspace/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm --filter web dev --host 0.0.0.0 --port 5173"
    networks:
      - app-network

volumes:
  pgdata:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  pnpm_store:

networks:
  app-network:
